<!doctype html>
<html lang="tr">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>tyee | Değerlendirme</title>
    <style>
      :root {
        --ink: #07113d;
        --muted: #667085;
        --line: #dfe7f3;
        --blue: #2196f3;
        --pink: #ec2f7f;
        --green: #20b35b;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        background: linear-gradient(135deg, #f3f9ff, #fff7fb);
        color: var(--ink);
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      .review-page {
        display: grid;
        min-height: 100vh;
        place-items: center;
        padding: 32px 18px;
      }

      .review-card {
        width: min(100%, 560px);
        border: 1px solid var(--line);
        border-radius: 18px;
        background: rgba(255, 255, 255, 0.94);
        box-shadow: 0 24px 70px rgba(7, 17, 61, 0.12);
        padding: 28px;
      }

      .brand {
        display: inline-flex;
        align-items: center;
        gap: 10px;
        margin-bottom: 28px;
        color: var(--ink);
        font-size: 32px;
        font-weight: 900;
        letter-spacing: 0;
        text-decoration: none;
      }

      .brand-mark {
        display: grid;
        width: 42px;
        height: 42px;
        place-items: center;
        border-radius: 12px;
        background: linear-gradient(135deg, var(--blue), var(--pink));
        color: #fff;
        font-size: 24px;
        font-weight: 900;
      }

      h1 {
        margin: 0;
        font-size: clamp(30px, 6vw, 44px);
        line-height: 1.05;
      }

      .lead {
        margin: 12px 0 26px;
        color: var(--muted);
        font-size: 18px;
        line-height: 1.5;
      }

      .rating-group {
        display: grid;
        gap: 10px;
        margin-bottom: 18px;
      }

      .rating-label,
      label {
        color: var(--ink);
        font-weight: 850;
      }

      .stars {
        display: grid;
        grid-template-columns: repeat(5, minmax(0, 1fr));
        gap: 8px;
      }

      .stars button {
        min-height: 54px;
        border: 1px solid var(--line);
        border-radius: 14px;
        background: #fff;
        color: #b8c0cf;
        font-size: 26px;
        cursor: pointer;
      }

      .stars button.is-active {
        border-color: rgba(236, 47, 127, 0.35);
        background: #fff0f7;
        color: var(--pink);
      }

      textarea {
        width: 100%;
        min-height: 132px;
        margin-top: 9px;
        border: 1px solid var(--line);
        border-radius: 14px;
        padding: 14px;
        resize: vertical;
        color: var(--ink);
        font: inherit;
      }

      .submit-row {
        display: flex;
        align-items: center;
        gap: 12px;
        margin-top: 20px;
      }

      .submit-row button {
        min-height: 50px;
        border: 0;
        border-radius: 14px;
        padding: 0 22px;
        background: linear-gradient(135deg, var(--blue), var(--pink));
        color: #fff;
        font-size: 17px;
        font-weight: 900;
        cursor: pointer;
      }

      .submit-row button:disabled {
        cursor: wait;
        opacity: 0.72;
      }

      .status {
        color: var(--muted);
        font-weight: 800;
      }

      .status.is-success {
        color: var(--green);
      }

      .status.is-error {
        color: #d92d20;
      }
    </style>
  </head>
  <body>
    <main class="review-page">
      <section class="review-card" aria-labelledby="review-title">
        <a class="brand" href="/index.html" aria-label="tyee ana sayfa">
          <span class="brand-mark">t</span>
          <span>tyee</span>
        </a>
        <h1 id="review-title">Deneyimini puanlar mısın?</h1>
        <p class="lead">Rezervasyon sonrası kısa notun hem tesise hem de diğer kullanıcılara yardımcı olur.</p>

        <form id="review-form">
          <div class="rating-group">
            <span class="rating-label">Memnuniyet puanı</span>
            <div class="stars" id="rating-buttons" aria-label="Puan seçimi">
              <button type="button" data-rating="1" aria-label="1 puan">★</button>
              <button type="button" data-rating="2" aria-label="2 puan">★</button>
              <button type="button" data-rating="3" aria-label="3 puan">★</button>
              <button type="button" data-rating="4" aria-label="4 puan">★</button>
              <button type="button" data-rating="5" aria-label="5 puan">★</button>
            </div>
          </div>

          <label for="comment">Kısa not</label>
          <textarea id="comment" placeholder="Tesis, hizmet veren veya rezervasyon deneyimi hakkında kısa bir not bırakabilirsin."></textarea>

          <div class="submit-row">
            <button type="submit">Değerlendirmeyi gönder</button>
            <span class="status" id="status"></span>
          </div>
        </form>
      </section>
    </main>

    <script>
      const params = new URLSearchParams(window.location.search);
      const token = params.get("token") || "";
      const form = document.querySelector("#review-form");
      const statusText = document.querySelector("#status");
      const ratingButtons = Array.from(document.querySelectorAll("[data-rating]"));
      let rating = 0;

      function setStatus(message, type = "") {
        statusText.textContent = message;
        statusText.className = `status ${type}`.trim();
      }

      ratingButtons.forEach((button) => {
        button.addEventListener("click", () => {
          rating = Number(button.dataset.rating);
          ratingButtons.forEach((item) => {
            item.classList.toggle("is-active", Number(item.dataset.rating) <= rating);
          });
        });
      });

      form.addEventListener("submit", async (event) => {
        event.preventDefault();
        const submitButton = form.querySelector("button[type='submit']");
        const comment = document.querySelector("#comment").value.trim();

        if (!token) {
          setStatus("Değerlendirme bağlantısı eksik.", "is-error");
          return;
        }

        if (!rating) {
          setStatus("Lütfen 1 ile 5 arasında puan seç.", "is-error");
          return;
        }

        submitButton.disabled = true;
        setStatus("Gönderiliyor...");
        try {
          const response = await fetch("/api/reviews", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ token, rating, comment }),
          });
          const payload = await response.json().catch(() => ({}));
          if (!response.ok) throw new Error(payload.error || "Değerlendirme gönderilemedi.");
          form.reset();
          rating = 0;
          ratingButtons.forEach((item) => item.classList.remove("is-active"));
          setStatus("Teşekkürler, değerlendirmen alındı.", "is-success");
        } catch (error) {
          setStatus(error.message, "is-error");
          submitButton.disabled = false;
        }
      });
    </script>
  </body>
</html>
