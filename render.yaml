services:
  - type: web
    name: tyee-app
    runtime: node
    buildCommand: npm install
    startCommand: npm start
    disk:
      name: tyee-runtime-data
      mountPath: /var/data
      sizeGB: 1
    envVars:
      - key: NODE_ENV
        value: production
      - key: TYEE_RUNTIME_DIR
        value: /var/data
